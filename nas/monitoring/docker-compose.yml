name: nas-monitoring

services:
  loki:
    image: grafana/loki:latest
    container_name: nas-loki
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 2g
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "127.0.0.1:${LOKI_PORT}:3100"
    volumes:
      - /srv/nas-system/config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - nas_backend

  alloy:
    image: grafana/alloy:latest
    container_name: nas-alloy
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 512m
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - /srv/nas-system/config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /srv/nas-system/logs/samba:/var/log/samba:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - nas_backend
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: nas-grafana
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 1g
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - /srv/nas-system/config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - nas_backend
    depends_on:
      - loki

networks:
  nas_backend:
    external: true

volumes:
  loki_data:
  alloy_data:
  grafana_data:
