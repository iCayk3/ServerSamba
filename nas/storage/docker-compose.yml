name: nas-storage

services:
  samba:
    image: ghcr.io/servercontainers/samba:latest
    container_name: nas-samba
    hostname: nas-samba

    restart: unless-stopped

    ports:
      - "137:137/udp"
      - "138:138/udp"
      - "139:139/tcp"
      - "445:445/tcp"

    environment:
      - TZ=America/Sao_Paulo

      # Configuração global
      - SAMBA_CONF_WORKGROUP=WORKGROUP
      - SAMBA_CONF_SERVER_STRING=NAS Sol Provedor
      - SAMBA_CONF_MAP_TO_GUEST=Never
      - SAMBA_CONF_LOG_LEVEL=1

      # Grupos e GIDs fixos
      - GROUP_financeiro_rw=2001
      - GROUP_rh_rw=2002
      - GROUP_ti_rw=2003
      - GROUP_programas_rw=2004
      - GROUP_contabil_rw=2005

      # Usuário administrador
      # A senha será carregada do arquivo .env
      - ACCOUNT_admin=${SAMBA_ADMIN_PASSWORD}
      - UID_admin=1001

      # O admin pertence a todos os grupos
      - GROUPS_admin=financeiro_rw,rh_rw,ti_rw,programas_rw,contabil_rw

      # Compartilhamento FINANCEIRO
      - >-
        SAMBA_VOLUME_CONFIG_financeiro=[FINANCEIRO];
        path=/shares/financeiro;
        valid users=admin @financeiro_rw;
        write list=admin @financeiro_rw;
        read only=no;
        browseable=yes;
        create mask=0660;
        directory mask=2770;
        force create mode=0660;
        force directory mode=2770;
        vfs objects=full_audit;
        full_audit:prefix=USER=%u|IP=%I|SHARE=%S;
        full_audit:success=connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure=all;
        full_audit:facility=LOCAL5;
        full_audit:priority=NOTICE

      # Compartilhamento RH
      - >-
        SAMBA_VOLUME_CONFIG_rh=[RH];
        path=/shares/rh;
        valid users=admin @rh_rw;
        write list=admin @rh_rw;
        read only=no;
        browseable=yes;
        create mask=0660;
        directory mask=2770;
        force create mode=0660;
        force directory mode=2770;
        vfs objects=full_audit;
        full_audit:prefix=USER=%u|IP=%I|SHARE=%S;
        full_audit:success=connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure=all;
        full_audit:facility=LOCAL5;
        full_audit:priority=NOTICE

      # Compartilhamento T.I
      - >-
        SAMBA_VOLUME_CONFIG_ti=[T.I];
        path=/shares/ti;
        valid users=admin @ti_rw;
        write list=admin @ti_rw;
        read only=no;
        browseable=yes;
        create mask=0660;
        directory mask=2770;
        force create mode=0660;
        force directory mode=2770;
        vfs objects=full_audit;
        full_audit:prefix=USER=%u|IP=%I|SHARE=%S;
        full_audit:success=connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure=all;
        full_audit:facility=LOCAL5;
        full_audit:priority=NOTICE

      # Compartilhamento PROGRAMAS COMPARTILHADOS
      - >-
        SAMBA_VOLUME_CONFIG_programas=[PROGRAMAS COMPARTILHADOS];
        path=/shares/programas-compartilhados;
        valid users=admin @programas_rw;
        write list=admin @programas_rw;
        read only=no;
        browseable=yes;
        create mask=0660;
        directory mask=2770;
        force create mode=0660;
        force directory mode=2770;
        vfs objects=full_audit;
        full_audit:prefix=USER=%u|IP=%I|SHARE=%S;
        full_audit:success=connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure=all;
        full_audit:facility=LOCAL5;
        full_audit:priority=NOTICE

      # Compartilhamento CONTABIL
      - >-
        SAMBA_VOLUME_CONFIG_contabil=[CONTABIL];
        path=/shares/contabil;
        valid users=admin @contabil_rw;
        write list=admin @contabil_rw;
        read only=no;
        browseable=yes;
        create mask=0660;
        directory mask=2770;
        force create mode=0660;
        force directory mode=2770;
        vfs objects=full_audit;
        full_audit:prefix=USER=%u|IP=%I|SHARE=%S;
        full_audit:success=connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure=all;
        full_audit:facility=LOCAL5;
        full_audit:priority=NOTICE

    volumes:
      - /srv/nas-data/financeiro:/shares/financeiro
      - /srv/nas-data/rh:/shares/rh
      - /srv/nas-data/ti:/shares/ti
      - /srv/nas-data/programas-compartilhados:/shares/programas-compartilhados
      - /srv/nas-data/contabil:/shares/contabil

      # Mantém usuários e configuração do Samba
      - samba_config:/etc/samba

volumes:
  samba_config:
