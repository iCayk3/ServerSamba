name: nas-storage

services:
  samba:
    image: ghcr.io/servercontainers/samba:latest
    container_name: nas-samba
    hostname: nas-samba
    restart: unless-stopped

    cpus: 2.0
    mem_limit: 2g

    ports:
      - "137:137/udp"
      - "138:138/udp"
      - "139:139/tcp"
      - "445:445/tcp"

    environment:
      - TZ=${TZ}
      - MODEL=NAS
      - AVAHI_NAME=${SAMBA_SERVER_NAME}
      - SAMBA_CONF_WORKGROUP=${SAMBA_WORKGROUP}
      - SAMBA_CONF_MAP_TO_GUEST=Bad User
      - FAIL_FAST=true

      # =====================================================
      # GRUPOS SAMBA
      # =====================================================
      - GROUP_financeiro_ro=2001
      - GROUP_financeiro_rw=2002
      - GROUP_rh_ro=2011
      - GROUP_rh_rw=2012

      # =====================================================
      # USUÁRIO 1
      # =====================================================
      - ACCOUNT_${SAMBA_USER1}=${SAMBA_USER1_PASSWORD}
      - UID_${SAMBA_USER1}=1001
      - GROUPS_${SAMBA_USER1}=financeiro_rw,rh_ro

      # =====================================================
      # USUÁRIO 2
      # =====================================================
      - ACCOUNT_${SAMBA_USER2}=${SAMBA_USER2_PASSWORD}
      - UID_${SAMBA_USER2}=1002
      - GROUPS_${SAMBA_USER2}=financeiro_ro,rh_rw

      # =====================================================
      # COMPARTILHAMENTO FINANCEIRO
      # =====================================================
      - >-
        SAMBA_VOLUME_CONFIG_financeiro=[Financeiro];
        path=/shares/financeiro;
        valid users = @financeiro_ro, @financeiro_rw;
        read list = @financeiro_ro;
        write list = @financeiro_rw;
        guest ok = no;
        browseable = yes;
        read only = yes;
        force create mode = 0660;
        force directory mode = 0770;
        create mask = 0660;
        directory mask = 0770;
        vfs objects = full_audit;
        full_audit:prefix = USER=%u|IP=%I|SHARE=%S;
        full_audit:success = connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure = all;
        full_audit:facility = LOCAL5;
        full_audit:priority = NOTICE

      # =====================================================
      # COMPARTILHAMENTO RH
      # =====================================================
      - >-
        SAMBA_VOLUME_CONFIG_rh=[RH];
        path=/shares/rh;
        valid users = @rh_ro, @rh_rw;
        read list = @rh_ro;
        write list = @rh_rw;
        guest ok = no;
        browseable = yes;
        read only = yes;
        force create mode = 0660;
        force directory mode = 0770;
        create mask = 0660;
        directory mask = 0770;
        vfs objects = full_audit;
        full_audit:prefix = USER=%u|IP=%I|SHARE=%S;
        full_audit:success = connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure = all;
        full_audit:facility = LOCAL5;
        full_audit:priority = NOTICE

      # =====================================================
      # COMPARTILHAMENTO PÚBLICO
      # =====================================================
      - >-
        SAMBA_VOLUME_CONFIG_publico=[Publico];
        path=/shares/publico;
        valid users = ${SAMBA_USER1}, ${SAMBA_USER2};
        write list = ${SAMBA_USER1}, ${SAMBA_USER2};
        guest ok = no;
        browseable = yes;
        read only = no;
        force create mode = 0660;
        force directory mode = 0770;
        create mask = 0660;
        directory mask = 0770;
        vfs objects = full_audit;
        full_audit:prefix = USER=%u|IP=%I|SHARE=%S;
        full_audit:success = connect disconnect mkdirat renameat unlinkat pwrite;
        full_audit:failure = all;
        full_audit:facility = LOCAL5;
        full_audit:priority = NOTICE

    volumes:
      - /srv/nas-data/financeiro:/shares/financeiro
      - /srv/nas-data/rh:/shares/rh
      - /srv/nas-data/publico:/shares/publico
      - samba_config:/etc/samba
      - /srv/nas-system/logs/samba:/var/log/samba

    networks:
      - nas_backend

    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:17-alpine
    container_name: nas-postgres
    hostname: postgres
    restart: unless-stopped

    cpus: 1.5
    mem_limit: 3g

    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - nas_backend

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8-alpine
    container_name: nas-redis
    hostname: redis
    restart: unless-stopped

    cpus: 0.5
    mem_limit: 1g

    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"

    volumes:
      - redis_data:/data

    networks:
      - nas_backend

    healthcheck:
      test:
        - CMD
        - redis-cli
        - --no-auth-warning
        - -a
        - ${REDIS_PASSWORD}
        - ping
      interval: 10s
      timeout: 5s
      retries: 10

    security_opt:
      - no-new-privileges:true

  nextcloud:
    image: nextcloud:apache
    container_name: nas-nextcloud
    hostname: nextcloud
    restart: unless-stopped

    cpus: 2.0
    mem_limit: 4g

    ports:
      - "${NEXTCLOUD_PORT}:80"

    environment:
      TZ: ${TZ}

      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}

      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}

      PHP_MEMORY_LIMIT: 1024M
      PHP_UPLOAD_LIMIT: 10G
      APACHE_BODY_LIMIT: 0

    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data

    networks:
      - nas_backend

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true

  nextcloud-cron:
    image: nextcloud:apache
    container_name: nas-nextcloud-cron
    restart: unless-stopped

    cpus: 0.25
    mem_limit: 512m

    entrypoint:
      - /cron.sh

    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data

    networks:
      - nas_backend

    depends_on:
      nextcloud:
        condition: service_started

    security_opt:
      - no-new-privileges:true

networks:
  nas_backend:
    external: true

volumes:
  samba_config:
    name: nas_samba_config

  postgres_data:
    name: nas_postgres_data

  redis_data:
    name: nas_redis_data

  nextcloud_html:
    name: nas_nextcloud_html

  nextcloud_data:
    name: nas_nextcloud_data
